<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>duffers x 2 Crosswords</title>
  <style>
    :root {
      --ink: #18201d;
      --muted: #5f6b65;
      --paper: #f7f1e4;
      --line: #7c776b;
      --cell: #fffaf0;
      --accent: #2f6f73;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background: linear-gradient(180deg, #e7dfcf, #f9f5ea 35%, #ddd2bf);
    }

    main {
      width: min(920px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      border-bottom: 6px solid var(--ink);
      margin-bottom: 22px;
      padding-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: .95;
      letter-spacing: 0;
    }

    .subhead {
      margin: 8px 0 0;
      color: var(--muted);
      font: 1rem/1.4 system-ui, sans-serif;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 16px;
    }

    .choice {
      display: block;
      min-height: 190px;
      padding: 18px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--cell);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(24, 32, 29, .12);
    }

    .choice:hover,
    .choice:focus-within {
      border-color: var(--accent);
      outline: 0;
      transform: translateY(-1px);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: #fffaf0;
      color: var(--ink);
      text-decoration: none;
      font: 700 .95rem system-ui, sans-serif;
    }

    .links a:hover,
    .links a:focus {
      background: #d7ece8;
      outline: 0;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 1.65rem;
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font: 1rem/1.45 system-ui, sans-serif;
    }

    @media (max-width: 680px) {
      .choices {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>duffers x 2</h1>
      <p class="subhead">Cycling crosswords</p>
    </header>

    <section class="choices" aria-label="Available crosswords">
      <article class="choice">
        <h2>Original Cycling Crossword</h2>
        <p>The first cyclist-themed puzzle, kept as its own page so existing players do not lose it.</p>
        <div class="links">
          <a href="cycling-original-phone.html">Phone</a>
          <a href="cycling-original.html">Desktop</a>
        </div>
      </article>

      <article class="choice">
        <h2>Expanded Cycling Crossword</h2>
        <p>A larger version with 20 Across and 20 Down clues.</p>
        <div class="links">
          <a href="cycling-expanded-phone.html">Phone</a>
          <a href="cycling-expanded.html">Desktop</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
